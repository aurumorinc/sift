[project]
name = "sift"
version = "0.7.0"

description = "Sift is an API-driven platform for defining, managing, and executing DSPy-based AI agents."
authors = [
    {name = "Aryan Singh", email = "aryan.singh@aurumor.com"},
]

dependencies = [
    "dspy-ai>=3.2.1",
    "pydantic-settings>=2.14.2",
    "langfuse>=4.12.0",
    "litellm>=1.89.4",
    "worldline @ git+https://github.com/aurumorinc/worldline-python.git",
]
requires-python = "<3.14,>=3.11"
readme = "README.md"
license = {text = "MIT"}


[tool.pdm]
distribution = false

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "ruff>=0.15.19",
    "pyrefly>=1.1.1",
    "mkinit>=1.2.0",
    "pytest-mock>=3.15.1",
    "pytest-vcr>=1.0.2",
    "vcrpy>=8.2.1",
    "pyyaml>=6.0",
]

[tool.pytest.ini_options]
pythonpath = [
  "src",
  "../../apps/sift-api"
]

[tool.pyrefly]
project-includes = [
    "**/*.py*",
    "**/*.ipynb",
]
